name: etl-update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without writing to database'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      sample_size:
        description: 'Process only N items per step (0 = all)'
        required: false
        default: '0'
        type: string
      skip_discover:
        description: 'Skip ID discovery from TMDB exports'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_info:
        description: 'Skip info update for movies/TV shows'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_cast_crew:
        description: 'Skip cast/crew update'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl-requirements.txt

      - name: Check required secrets are set
        run: |
          [ -n "$TMDBAPIKEY" ] && echo "TMDBAPIKEY: set" || (echo "TMDBAPIKEY: MISSING" && exit 1)
          [ -n "$MOTHERDUCK_TOKEN" ] && echo "MOTHERDUCK_TOKEN: set" || (echo "MOTHERDUCK_TOKEN: MISSING" && exit 1)
          [ -n "$AWS_ACCESS_KEY_ID" ] && echo "AWS_ACCESS_KEY_ID: set" || (echo "AWS_ACCESS_KEY_ID: MISSING" && exit 1)
          [ -n "$AWS_SECRET_ACCESS_KEY" ] && echo "AWS_SECRET_ACCESS_KEY: set" || (echo "AWS_SECRET_ACCESS_KEY: MISSING" && exit 1)
          [ -n "$S3_BUCKET_NAME" ] && echo "S3_BUCKET_NAME: set" || (echo "S3_BUCKET_NAME: MISSING" && exit 1)
        env:
          TMDBAPIKEY: ${{ secrets.TMDBAPIKEY }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

      - name: Verify backup exists in S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          LATEST=$(aws s3 ls "s3://$S3_BUCKET_NAME/" | grep "duckdb_backup_" | sort | tail -n 1)
          if [ -z "$LATEST" ]; then
            echo "No backup found in S3 — halting ETL for safety."
            exit 1
          fi
          echo "Backup found: $LATEST"

      - name: Restore checkpoints from previous run
        uses: dawidd6/action-download-artifact@v6
        with:
          name: etl-checkpoints
          workflow: etl-update.yml
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Build update_job arguments
        id: build-args
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run || 'false' }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # For scheduled runs (no manual input), default to --sample 5000
          # For manual runs, use the provided sample_size (0 = all)
          SAMPLE="${{ inputs.sample_size }}"
          if [ -z "$SAMPLE" ]; then
            SAMPLE="5000"
            echo "Scheduled run — defaulting to --sample 5000"
          fi
          if [ "$SAMPLE" != "0" ]; then
            ARGS="$ARGS --sample $SAMPLE"
          fi

          if [ "${{ inputs.skip_discover || 'false' }}" = "true" ]; then
            ARGS="$ARGS --skip-discover"
          fi
          if [ "${{ inputs.skip_info || 'false' }}" = "true" ]; then
            ARGS="$ARGS --skip-info"
          fi
          if [ "${{ inputs.skip_cast_crew || 'false' }}" = "true" ]; then
            ARGS="$ARGS --skip-cast-crew"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Running with args: $ARGS"

      - name: Run ETL update
        env:
          TMDBAPIKEY: ${{ secrets.TMDBAPIKEY }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          set -euo pipefail
          echo "Checkpoint files found:"
          ls -la *.pkl 2>/dev/null || echo "  (none)"
          python update_job.py ${{ steps.build-args.outputs.args }}

      - name: Upload checkpoints for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-checkpoints
          path: '*.pkl'
          retention-days: 14
          if-no-files-found: warn
          overwrite: true

      - name: Upload ETL logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-logs
          path: |
            update_job_*.log
            *_skipped_ids.log
            *_null_columns.log
          retention-days: 7
          if-no-files-found: warn
